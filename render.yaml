services:
  - type: web
    name: mockdraft-api
    env: python
    rootDir: .
    buildCommand: pip install -r apps/api/requirements.txt
    startCommand: uvicorn apps.api.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: CORS_ALLOW_ORIGINS
        sync: false
      - key: CORS_ALLOW_ORIGIN_REGEX
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DRAFT_RUNTIME_STATE_PATH
        sync: false

  - type: cron
    name: mockdraft-live-sync
    env: python
    rootDir: .
    buildCommand: pip install -r apps/api/requirements.txt
    schedule: "0 * * * *"
    startCommand: python scripts/sync_live_runtime.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        sync: false
      - key: DRAFT_RUNTIME_STATE_PATH
        sync: false
